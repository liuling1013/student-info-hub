<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 学生成绩管理系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
            margin: 0;
            background: #f5f7fa;
        }
        .login-box {
            width: 320px;
            padding: 35px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin: 0 0 25px 0;
            color: #333;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 11px;
            margin-top: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background: #0069d9;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>学生成绩管理系统</h2>
    <input id="username" placeholder="请输入账号" autocomplete="username">
    <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password">
    <button onclick="handleLogin()">登 录</button>
</div>

<script src="/js/common.js"></script>
<script>
    // 回车快捷登录
    document.getElementById("password").addEventListener("keyup", e => {
        if (e.key === "Enter") handleLogin();
    });

    function handleLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) {
            alert("请输入账号和密码");
            return;
        }

        authFetch("/api/auth/login", {
            method: "POST",
            body: { username, password }
        }).then(res => {
            if (res.code === 200) {
                // 存储通用信息
                localStorage.setItem("token", res.data.token);
                localStorage.setItem("userId", res.data.userId);
                localStorage.setItem("role", res.data.role);

                // 存储学生ID
                if (res.data.studentId) {
                    localStorage.setItem("studentId", res.data.studentId);
                }
                // 存储教师ID（必须步骤）
                if (res.data.teacherId) {
                    localStorage.setItem("teacherId", res.data.teacherId);
                }

                // 按角色跳转
                const role = res.data.role;
                if (role === "admin") {
                    location.href = "/admin/dashboard";
                } else if (role === "teacher") {
                    location.href = "/teacher/dashboard";
                } else {
                    location.href = "/student/course_list";
                }
            } else {
                alert(res.msg);
            }
        }).catch(err => {
            alert("登录请求失败，请检查服务是否启动");
            console.error(err);
        });
    }
</script>
</body>
</html>
