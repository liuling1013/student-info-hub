<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>成绩录入</title>
    <style>
        body { font-family: "Microsoft YaHei", Arial, sans-serif; margin: 25px; }
        .back-link { margin-bottom: 20px; display: inline-block; color: #007bff; font-size: 24px; text-decoration: none; }
        h1 { font-size: 48px; margin: 0 0 30px 0; font-weight: bold; }

        .toolbar {
            display: flex;
            gap: 40px;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .toolbar label { font-size: 26px; }
        .toolbar select, .toolbar input {
            padding: 10px 12px;
            min-width: 320px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 22px;
        }

        .btn-group { margin-bottom: 20px; }
        .save-btn, .export-btn {
            padding: 15px 35px;
            cursor: pointer;
            font-size: 26px;
            border-radius: 4px;
            margin-right: 15px;
        }
        .save-btn { background: #007bff; color: white; border: none; }
        .export-btn { background: #f5f5f5; border: 2px solid #999; }

        table { border-collapse: collapse; width: 100%; margin-top: 15px; }
        th, td {
            border: 1px solid #ccc;
            padding: 18px 15px;
            text-align: left;
            font-size: 24px;
            font-weight: normal;
        }
        th { background: #f5f5f5; font-weight: bold; }
        input[type="number"] { width: 100px; padding: 6px; font-size: 20px; }

        .tip {
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            font-size: 20px;
            display: none;
        }
        .tip-error { color: #d93025; background: #ffebe9; }
        .tip-empty { color: #666; background: #f5f5f5; text-align: center; }
        .loading { font-size: 24px; color: #666; }
    </style>
</head>
<body>
<a class="back-link" href="/teacher/dashboard">← 返回课程列表</a>
<h1>成绩录入</h1>

<div id="errorTip" class="tip tip-error"></div>
<div id="emptyTip" class="tip tip-empty">暂无学生数据</div>

<div class="toolbar">
    <div>
        <label>选择课程：</label>
        <select id="courseSelect">
            <option value="">请选择课程</option>
        </select>
    </div>
    <div>
        <label>学号搜索：</label>
        <input type="text" id="searchInput" placeholder="输入学号过滤">
    </div>
</div>

<div class="btn-group">
    <button class="save-btn" id="saveBtn">保存全部成绩</button>
    <button class="export-btn" id="exportBtn">导出Excel</button>
</div>

<div id="loading" class="loading">加载中...</div>
<table id="studentTable" style="display:none;">
    <thead>
    <tr>
        <th>学号</th><th>姓名</th><th>班级</th><th>平时成绩</th><th>期末成绩</th><th>总评</th><th>绩点</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="/js/common.js"></script>
<script>
    const teacherId = localStorage.getItem("teacherId");
    const semester = "2025-2026-2";
    let studentList = [];
    let currentOfferId = null;
    let courseList = [];

    // 兼容字段取值：优先驼峰，其次下划线
    function getVal(item, camel, underscore) {
        if (item == null) return "";
        if (item[camel] !== undefined && item[camel] !== null) return item[camel];
        if (item[underscore] !== undefined && item[underscore] !== null) return item[underscore];
        return "";
    }

    // 显示错误
    function showError(msg) {
        const tip = document.getElementById("errorTip");
        tip.textContent = msg;
        tip.style.display = "block";
        document.getElementById("loading").style.display = "none";
        document.getElementById("studentTable").style.display = "none";
        document.getElementById("emptyTip").style.display = "none";
    }

    // 页面加载完成后初始化
    window.onload = function() {
        // 1. 校验教师ID
        if (!teacherId) {
            showError("未获取到教师信息，请重新登录");
            return;
        }

        // 2. 绑定事件
        document.getElementById("courseSelect").addEventListener("change", onCourseChange);
        document.getElementById("searchInput").addEventListener("input", filterStudents);
        document.getElementById("saveBtn").addEventListener("click", saveAllGrades);
        document.getElementById("exportBtn").addEventListener("click", exportExcel);

        // 3. 加载课程列表
        loadTeacherCourses();
    };

    // 加载教师任课课程
    function loadTeacherCourses() {
        document.getElementById("loading").style.display = "block";
        const url = `/api/teacher/my-courses?teacherId=${teacherId}&semester=${semester}`;
        console.log("请求课程接口：", url);

        authFetch(url)
            .then(res => {
                document.getElementById("loading").style.display = "none";
                console.log("课程接口返回：", res);

                if (res.code !== 200) {
                    showError("课程加载失败：" + res.msg);
                    return;
                }

                courseList = res.data || [];
                const select = document.getElementById("courseSelect");
                select.innerHTML = '<option value="">请选择课程</option>';

                if (courseList.length === 0) {
                    showError("当前学期暂无任课课程，请检查学期参数或开课数据");
                    return;
                }

                // 渲染下拉选项
                courseList.forEach(c => {
                    const opt = document.createElement("option");
                    opt.value = getVal(c, "offerId", "offer_id");
                    opt.textContent = getVal(c, "courseName", "course_name") + "（" + getVal(c, "semester", "semester") + "）";
                    select.appendChild(opt);
                });

                // 自动选中URL传入的课程
                const urlOfferId = new URLSearchParams(location.search).get("offerId");
                if (urlOfferId) {
                    select.value = urlOfferId;
                    onCourseChange();
                }
            })
            .catch(err => {
                document.getElementById("loading").style.display = "none";
                console.error("课程请求异常：", err);
                showError("接口请求失败：" + err.message + "，请检查服务是否正常");
            });
    }

    // 切换课程
    function onCourseChange() {
        currentOfferId = document.getElementById("courseSelect").value;
        document.getElementById("errorTip").style.display = "none";
        document.getElementById("emptyTip").style.display = "none";

        if (!currentOfferId) {
            document.getElementById("studentTable").style.display = "none";
            return;
        }
        loadStudentGrades();
    }

    // 加载学生成绩
    function loadStudentGrades() {
        document.getElementById("loading").style.display = "block";
        document.getElementById("studentTable").style.display = "none";

        authFetch(`/api/teacher/students?offerId=${currentOfferId}`)
            .then(res => {
                document.getElementById("loading").style.display = "none";
                if (res.code !== 200) {
                    showError("加载学生列表失败：" + res.msg);
                    return;
                }

                studentList = res.data || [];
                if (studentList.length === 0) {
                    document.getElementById("emptyTip").style.display = "block";
                    return;
                }

                renderTable();
                document.getElementById("studentTable").style.display = "table";
            })
            .catch(err => {
                document.getElementById("loading").style.display = "none";
                showError("请求失败：" + err.message);
            });
    }

    // 渲染学生表格
    function renderTable() {
        const tbody = document.querySelector("#studentTable tbody");
        tbody.innerHTML = "";

        studentList.forEach(item => {
            const row = tbody.insertRow();
            const studentNo = getVal(item, "studentNo", "student_no");
            const name = getVal(item, "name", "name");
            const className = getVal(item, "className", "class_name");
            const regularScore = getVal(item, "regularScore", "regular_score");
            const examScore = getVal(item, "examScore", "exam_score");
            const totalScore = getVal(item, "totalScore", "total_score");
            const gradePoint = getVal(item, "gradePoint", "grade_point");

            row.insertCell().textContent = studentNo;
            row.insertCell().textContent = name;
            row.insertCell().textContent = className;

            // 平时成绩输入框
            const regularInput = document.createElement("input");
            regularInput.type = "number";
            regularInput.min = "0";
            regularInput.max = "100";
            regularInput.value = regularScore || "";
            row.insertCell().appendChild(regularInput);

            // 期末成绩输入框
            const examInput = document.createElement("input");
            examInput.type = "number";
            examInput.min = "0";
            examInput.max = "100";
            examInput.value = examScore || "";
            row.insertCell().appendChild(examInput);

            // 总评自动计算
            const totalCell = row.insertCell();
            const updateTotal = () => {
                const r = parseFloat(regularInput.value) || 0;
                const e = parseFloat(examInput.value) || 0;
                totalCell.textContent = (r * 0.4 + e * 0.6).toFixed(1);
            };
            regularInput.addEventListener("input", updateTotal);
            examInput.addEventListener("input", updateTotal);
            totalCell.textContent = totalScore || (regularScore && examScore
                ? (parseFloat(regularScore)*0.4 + parseFloat(examScore)*0.6).toFixed(1)
                : "-");

            // 绩点
            row.insertCell().textContent = gradePoint || "-";

            // 挂载到item上
            item.regularInput = regularInput;
            item.examInput = examInput;
            item.row = row;
            item.studentNo = studentNo;
            item.enrollId = getVal(item, "enrollId", "enroll_id");
        });
    }

    // 学号过滤
    function filterStudents() {
        const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
        studentList.forEach(item => {
            item.row.style.display = item.studentNo.toLowerCase().includes(keyword) ? "" : "none";
        });
    }

    // 批量保存成绩
    function saveAllGrades() {
        if (!currentOfferId) {
            alert("请先选择课程");
            return;
        }
        const enrollments = studentList.map(item => ({
            enrollId: item.enrollId,
            regularScore: parseFloat(item.regularInput.value) || 0,
            examScore: parseFloat(item.examInput.value) || 0
        }));

        authFetch("/api/teacher/grades/batch", {
            method: "POST",
            body: enrollments
        }).then(res => {
            alert(res.msg);
            if (res.code === 200) loadStudentGrades();
        });
    }

    // 导出Excel
    function exportExcel() {
        if (!currentOfferId) {
            alert("请先选择课程");
            return;
        }
        const token = localStorage.getItem("token");

        fetch(`/api/teacher/export?offerId=${currentOfferId}`, {
            headers: { "Authorization": "Bearer " + token }
        }).then(res => {
            if (!res.ok) throw new Error("导出请求失败");
            return res.blob();
        }).then(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "课程成绩表.xlsx";
            a.click();
            URL.revokeObjectURL(url);
        }).catch(err => {
            alert("导出失败：" + err.message);
        });
    }
</script>
</body>
</html>
